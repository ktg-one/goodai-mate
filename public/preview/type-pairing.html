<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type · Pairing in use" subtitle="Fraunces italic + WONK axis for emphasis" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type · Pairing in use</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 36px; background: var(--paper); }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink); background: var(--ink); color: var(--paper);
    padding: 4px 10px; display: inline-block; font-weight: 600;
    margin-bottom: 14px;
  }
  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 56px;
    letter-spacing: -0.035em;
    line-height: 0.95;
    margin: 0 0 16px;
    color: var(--ink);
    font-variation-settings: "opsz" 144, "SOFT" 50;
  }
  /* Italic + WONK for emphasis — the "good'ai" lift */
  h1 em {
    font-style: italic;
    color: var(--orange);
    font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
  }
  p {
    font-family: var(--font-sans);
    font-size: 16px; line-height: 1.6;
    color: var(--ink-soft);
    margin: 0; max-width: 540px;
  }
  p em {
    font-family: var(--font-display);
    font-style: italic;
    color: var(--ink);
    font-variation-settings: "opsz" 96, "SOFT" 80, "WONK" 1;
    font-weight: 500;
  }
  .rule {
    margin-top: 22px;
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-mute);
    border-top: 1px dashed var(--ink);
    padding-top: 10px;
    max-width: 540px;
  }
  .rule b { color: var(--ink); font-weight: 700; }
</style>
</head>
<body>
  <div class="eyebrow">Perth · WA</div>
  <h1>Knock off early. <em>We&rsquo;ll sort the boring stuff.</em></h1>
  <p>Tell us your problem and we&rsquo;ll figure out how to fix it. No jargon, no runaround — just an automation that works <em>on Monday morning</em>.</p>
  <div class="rule"><b>Rule</b> — italic + WONK on Fraunces is reserved for one phrase per surface. It's the lift, not the rhythm.</div>
</body>
</html>
