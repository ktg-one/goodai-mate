<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type · Pairing in use</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ocean-600); margin-bottom: 8px; }
  h1 { font-family: var(--font-display); font-weight: 600; font-size: 48px; letter-spacing: -0.03em; line-height: 1.05; margin: 0 0 14px; color: var(--ink); }
  h1 em { font-style: normal; color: var(--orange); }
  p { font-family: var(--font-sans); font-size: 16px; line-height: 1.6; color: var(--ink-soft); margin: 0; max-width: 540px; }
</style>
</head>
<body>
  <div class="eyebrow">Perth · WA</div>
  <h1>Knock off early. <em>We&rsquo;ll sort the boring stuff.</em></h1>
  <p>Tell us your problem and we&rsquo;ll figure out how to fix it. No jargon, no runaround — just an automation that works on Monday morning.</p>
</body>
</html>
