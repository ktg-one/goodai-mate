<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Services marquee</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px 0; background: var(--paper); }
  .marquee { display: flex; overflow: hidden; white-space: nowrap; gap: 0; padding: 14px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .track { display: flex; gap: 0; animation: scroll 26s linear infinite; }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .item { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.04em; color: var(--ink-soft); padding: 0 4px; }
  .sep { color: var(--orange-tint); padding: 0 14px; }
</style>
</head>
<body>
  <div class="marquee">
    <div class="track">
      <span class="item">Email drafting</span><span class="sep">/</span>
      <span class="item">Invoice processing</span><span class="sep">/</span>
      <span class="item">CRM sync</span><span class="sep">/</span>
      <span class="item">Social scheduling</span><span class="sep">/</span>
      <span class="item">Voice agents</span><span class="sep">/</span>
      <span class="item">Lead capture</span><span class="sep">/</span>
      <span class="item">Report generation</span><span class="sep">/</span>
      <span class="item">Email drafting</span><span class="sep">/</span>
      <span class="item">Invoice processing</span><span class="sep">/</span>
      <span class="item">CRM sync</span><span class="sep">/</span>
      <span class="item">Social scheduling</span><span class="sep">/</span>
      <span class="item">Voice agents</span><span class="sep">/</span>
      <span class="item">Lead capture</span><span class="sep">/</span>
      <span class="item">Report generation</span><span class="sep">/</span>
    </div>
  </div>
</body>
</html>
