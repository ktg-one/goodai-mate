<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors · WA Ocean scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; }
  .scale { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; height: 110px; }
  .step { border-radius: var(--radius-sm); padding: 8px 6px; display: flex; flex-direction: column; justify-content: space-between; }
  .num { font-family: var(--font-mono); font-size: 11px; }
  .hex { font-family: var(--font-mono); font-size: 9px; opacity: 0.85; }
  .ttl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="ttl">WA Ocean — third brand colour (Indian Ocean blue)</div>
  <div class="scale">
    <div class="step" style="background: var(--ocean-50);  color: var(--ocean-600);"><span class="num">50</span><span class="hex">#E6F3F7</span></div>
    <div class="step" style="background: var(--ocean-100); color: var(--ocean-600);"><span class="num">100</span><span class="hex">#B3DBEA</span></div>
    <div class="step" style="background: var(--ocean-200); color: var(--ocean-600);"><span class="num">200</span><span class="hex">#66B8D5</span></div>
    <div class="step" style="background: var(--ocean-300); color: #fff;"><span class="num">300</span><span class="hex">#1A94BB</span></div>
    <div class="step" style="background: var(--ocean-400); color: #fff;"><span class="num">400★</span><span class="hex">#006B8F</span></div>
    <div class="step" style="background: var(--ocean-500); color: #fff;"><span class="num">500</span><span class="hex">#005372</span></div>
    <div class="step" style="background: var(--ocean-600); color: #fff;"><span class="num">600</span><span class="hex">#003D56</span></div>
  </div>
</body>
</html>
