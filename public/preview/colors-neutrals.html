<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Colors · Warm neutrals" subtitle="Paper, line, ink — never pure white/black" viewport="700x250" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors · Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--paper); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .swatch { border-radius: var(--radius-sm); padding: 12px; height: 100px; display: flex; flex-direction: column; justify-content: space-between; border: 2px solid var(--ink); }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; }
  .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.75; }
  .role { font-family: var(--font-sans); font-size: 12px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch" style="background: var(--paper); color: var(--ink);"><span class="name">paper</span><span class="role">page canvas</span><span class="hex">#FFF0D0</span></div>
    <div class="swatch" style="background: var(--bg-raised); color: var(--ink);"><span class="name">raised</span><span class="role">card lift</span><span class="hex">#FFFAEC</span></div>
    <div class="swatch" style="background: var(--paper-deep); color: var(--ink);"><span class="name">paper-deep</span><span class="role">sunken band</span><span class="hex">#F6E2B8</span></div>
    <div class="swatch" style="background: var(--paper-3); color: var(--ink);"><span class="name">paper-3</span><span class="role">divider tone</span><span class="hex">#ECD49A</span></div>
    <div class="swatch" style="background: var(--cream-line); color: var(--ink);"><span class="name">cream-line</span><span class="role">hairline</span><span class="hex">#E0C690</span></div>
    <div class="swatch" style="background: var(--ink-faint); color: var(--paper);"><span class="name">ink-faint</span><span class="role">disabled</span><span class="hex">#A0967C</span></div>
    <div class="swatch" style="background: var(--ink-mute); color: var(--paper);"><span class="name">ink-mute</span><span class="role">labels</span><span class="hex">#6B6452</span></div>
    <div class="swatch" style="background: var(--ink-soft); color: var(--paper);"><span class="name">ink-soft</span><span class="role">body</span><span class="hex">#1C1C1C</span></div>
    <div class="swatch" style="background: var(--ink); color: var(--paper);"><span class="name">ink</span><span class="role">headings · edges</span><span class="hex">#111111</span></div>
  </div>
</body>
</html>
