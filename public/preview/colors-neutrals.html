<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors · Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .swatch { border-radius: var(--radius-sm); padding: 12px; height: 100px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--line-soft); }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
  .role { font-family: var(--font-sans); font-size: 12px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch" style="background: var(--paper); color: var(--ink);"><span class="name">paper</span><span class="role">page bg</span><span class="hex">var(--paper)</span></div>
    <div class="swatch" style="background: var(--paper-deep); color: var(--ink);"><span class="name">paper-deep</span><span class="role">sunken band</span><span class="hex">#F7F0E1</span></div>
    <div class="swatch" style="background: #fff; color: var(--ink);"><span class="name">raised</span><span class="role">card lift</span><span class="hex">#FFFFFF</span></div>
    <div class="swatch" style="background: var(--line); color: var(--ink);"><span class="name">line</span><span class="role">hairline</span><span class="hex">#E5DDC9</span></div>
    <div class="swatch" style="background: var(--ink-faint); color: var(--paper);"><span class="name">ink-faint</span><span class="role">disabled</span><span class="hex">#8A938F</span></div>
    <div class="swatch" style="background: var(--ink-mute); color: var(--paper);"><span class="name">ink-mute</span><span class="role">labels</span><span class="hex">#5C6A66</span></div>
    <div class="swatch" style="background: var(--ink-soft); color: var(--paper);"><span class="name">ink-soft</span><span class="role">body</span><span class="hex">#2B3835</span></div>
    <div class="swatch" style="background: var(--ink); color: var(--paper);"><span class="name">ink</span><span class="role">headings</span><span class="hex">#14201D</span></div>
  </div>
</body>
</html>
