<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body {
    margin: 0;
    padding: 28px 32px;
    background:
      repeating-linear-gradient(0deg, rgba(11,11,11,0.025) 0 1px, transparent 1px 4px),
      var(--paper);
    display: grid; gap: 18px;
  }
  .label {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink); font-weight: 700;
    margin-bottom: -8px;
  }
  .label span { color: var(--ink-mute); font-weight: 400; margin-left: 6px; }

  .input {
    width: 100%; box-sizing: border-box;
    padding: 14px 18px;
    border-radius: 4px;
    border: 2px solid var(--ink);
    background: var(--paper);
    box-shadow: var(--shadow-stamp);
    font-family: var(--font-sans);
    font-size: 15px;
    color: var(--ink);
    transition: transform 120ms, box-shadow 120ms;
  }
  .input::placeholder { color: var(--ink-faint); }
  .input:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
  .input:focus {
    outline: none;
    box-shadow: var(--shadow-stamp-orange);
    transform: translate(-1px, -1px);
  }
  .input.lg {
    padding: 18px 22px;
    font-size: 18px;
    box-shadow: 5px 5px 0 var(--ink);
  }
  .input.lg:focus { box-shadow: 5px 5px 0 var(--orange); }

  .input.error {
    box-shadow: 4px 4px 0 var(--warn);
    border-color: var(--ink);
  }
  .err-text {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--warn); font-weight: 700;
    margin-top: -10px;
  }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* mock focus state */
  .input.is-focus {
    box-shadow: var(--shadow-stamp-orange);
    transform: translate(-1px, -1px);
  }

  /* textarea variant */
  textarea.input {
    min-height: 100px; resize: vertical;
    box-shadow: 5px 5px 0 var(--ink);
  }
  textarea.input:focus { box-shadow: 5px 5px 0 var(--orange); }

  .help {
    font-family: var(--font-sans); font-size: 13px; color: var(--ink-mute);
    margin-top: -8px;
  }
</style>
</head>
<body>

  <span class="label">Hero · large<span>5px stamp</span></span>
  <input class="input lg" placeholder="Tell us your problem.">

  <span class="label">Form pair<span>focused on left = orange stamp</span></span>
  <div class="row">
    <input class="input is-focus" placeholder="Name" value="Joey">
    <input class="input" placeholder="Business name">
  </div>

  <span class="label">Textarea<span>same stamp rules</span></span>
  <textarea class="input" placeholder="What's eating your Friday?"></textarea>

  <span class="label">Error state<span>warn stamp</span></span>
  <input class="input error" value="not-an-email">
  <p class="err-text">→ Email's missing the @</p>

</body>
</html>
