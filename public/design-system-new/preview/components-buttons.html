<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body {
    margin: 0;
    padding: 28px 32px;
    background:
      repeating-linear-gradient(0deg, rgba(11,11,11,0.025) 0 1px, transparent 1px 4px),
      var(--paper);
  }
  .group {
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    padding: 16px 0;
    border-bottom: 1px solid var(--cream-line);
  }
  .group:last-child { border-bottom: none; }
  .label {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink);
    width: 110px; flex-shrink: 0;
    font-weight: 700;
  }
  .label span {
    display: block; font-weight: 400; color: var(--ink-mute);
    font-size: 9px; letter-spacing: 0.14em; margin-top: 2px;
  }

  .btn {
    font-family: var(--font-sans); font-size: 14px; font-weight: 600;
    padding: 11px 18px;
    border-radius: 4px;
    border: 2px solid var(--ink); cursor: pointer;
    transition: transform 120ms, box-shadow 120ms;
    display: inline-flex; align-items: center; gap: 8px;
    line-height: 1;
  }
  .btn:hover  { transform: translate(-1px,-1px); }
  .btn:active { transform: translate(2px,2px); box-shadow: none !important; }

  /* PRIMARY — ink + orange stamp (the brand signature) */
  .btn-primary {
    background: var(--ink); color: var(--paper);
    box-shadow: var(--shadow-stamp-orange);
  }
  .btn-primary:hover { box-shadow: 4px 4px 0 var(--orange); }

  /* SHOUT — orange fill, ink stamp (one per surface, max) */
  .btn-shout {
    background: var(--orange); color: var(--ink);
    box-shadow: var(--shadow-stamp);
  }
  .btn-shout:hover { background: var(--orange-deep); box-shadow: 4px 4px 0 var(--ink); }

  /* SECONDARY — paper, ink stamp */
  .btn-secondary {
    background: var(--paper); color: var(--ink);
    box-shadow: var(--shadow-stamp);
  }
  .btn-secondary:hover { box-shadow: 4px 4px 0 var(--ink); }

  /* OCEAN — non-CTA brand block */
  .btn-ocean {
    background: var(--ocean-400); color: var(--paper);
    box-shadow: var(--shadow-stamp);
  }
  .btn-ocean:hover { box-shadow: 4px 4px 0 var(--ink); }

  /* STICKER — yellow alert / sale label */
  .btn-sticker {
    background: var(--hi-yellow); color: var(--ink);
    box-shadow: var(--shadow-stamp);
    font-family: var(--font-mono); font-size: 12px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 9px 14px;
  }
  .btn-sticker:hover { box-shadow: 4px 4px 0 var(--ink); }

  /* GHOST */
  .btn-ghost {
    background: transparent; color: var(--ink); border-style: dashed;
    box-shadow: none;
  }
  .btn-ghost:hover { background: var(--paper-deep); transform: none; }

  /* DISABLED */
  .btn-disabled {
    background: var(--paper-3); color: var(--ink-faint);
    border-color: var(--ink-faint);
    box-shadow: none; cursor: not-allowed;
  }
  .btn-disabled:hover { transform: none; }

  /* Sizes */
  .btn-sm { font-size: 12px; padding: 8px 13px; }
  .btn-lg { font-size: 16px; padding: 14px 24px; }

  .btn-icon { width: 14px; height: 14px; }

  .hd {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink);
    display: flex; justify-content: space-between;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 8px; margin-bottom: 4px;
    font-weight: 700;
  }
  .hd .r { color: var(--ink-mute); font-weight: 400; }
</style>
</head>
<body>

  <div class="hd"><span>Buttons · variants</span><span class="r">Stamp shadow = signature</span></div>

  <div class="group">
    <div class="label">Primary<span>ink + orange stamp</span></div>
    <button class="btn btn-primary">Get a callback
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </button>
    <button class="btn btn-primary btn-lg">Book the chat</button>
    <button class="btn btn-primary btn-sm">Sort it</button>
  </div>

  <div class="group">
    <div class="label">Shout<span>orange · 1 per surface</span></div>
    <button class="btn btn-shout">Tell us your problem</button>
    <button class="btn btn-shout btn-lg">Start now</button>
  </div>

  <div class="group">
    <div class="label">Ocean<span>non-CTA brand block</span></div>
    <button class="btn btn-ocean">See workflows</button>
    <button class="btn btn-ocean btn-sm">Open chat</button>
  </div>

  <div class="group">
    <div class="label">Sticker<span>yellow · sale / alert</span></div>
    <button class="btn btn-sticker">Fix this</button>
    <button class="btn btn-sticker">Urgent</button>
  </div>

  <div class="group">
    <div class="label">Quiet<span>ghost &amp; disabled</span></div>
    <button class="btn btn-ghost">Skip for now</button>
    <button class="btn btn-disabled" disabled>Sending…</button>
  </div>

</body>
</html>
