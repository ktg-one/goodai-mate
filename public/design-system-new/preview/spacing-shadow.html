<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing · Shadow + Stamp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--paper); display: grid; gap: 18px; }
  .lead { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mute); }
  .lead b { color: var(--ink); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; align-items: end; }
  .tile {
    height: 84px; border-radius: 4px; border: 2px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .gold  { background: var(--gold); color: var(--ink); }
  .red   { background: var(--red); color: var(--paper); }
  .navy  { background: var(--navy); color: var(--paper); }
  .deep  { background: var(--ink); color: var(--paper); }
</style>
</head>
<body>
  <div class="lead"><b>Flat &ldquo;stamp&rdquo; shadows only.</b> A solid offset, never a blur. Match the stamp colour to the surface job.</div>
  <div class="grid">
    <div class="tile gold" style="box-shadow: var(--shadow-stamp);">stamp &middot; ink</div>
    <div class="tile red"  style="box-shadow: var(--shadow-stamp-orange);">stamp &middot; red &middot; CTA</div>
    <div class="tile navy" style="box-shadow: var(--shadow-stamp-ocean);">stamp &middot; navy &middot; block</div>
    <div class="tile deep" style="box-shadow: var(--shadow-stamp-deep);">stamp &middot; deep</div>
  </div>
</body>
</html>
