<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Lead capture card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body {
    margin: 0; padding: 24px;
    background:
      repeating-linear-gradient(0deg, rgba(11,11,11,0.025) 0 1px, transparent 1px 4px),
      var(--paper);
  }
  .lc {
    background: var(--ocean-400);
    color: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 4px;
    box-shadow: var(--shadow-stamp);
    padding: 24px;
    max-width: 540px;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    font-weight: 700;
    background: var(--paper); color: var(--ocean-400);
    padding: 4px 8px; align-self: flex-start;
    display: inline-block; margin-bottom: 12px;
  }
  h3 {
    margin: 0 0 4px;
    font-family: var(--font-display); font-weight: 700; font-size: 24px;
    line-height: 1.05; letter-spacing: -0.02em;
    font-variation-settings: "opsz" 96, "SOFT" 50;
    color: var(--paper);
  }
  p { margin: 0 0 16px; font-family: var(--font-sans); font-size: 14px; line-height: 1.5; color: var(--paper); opacity: 0.92; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  .input {
    flex: 1; padding: 11px 14px;
    border-radius: 4px;
    border: 2px solid var(--ink);
    background: var(--paper);
    font-family: var(--font-sans); font-size: 14px; color: var(--ink);
  }
  .input::placeholder { color: var(--ink-faint); }
  .input:focus { outline: 3px solid var(--hi-yellow); outline-offset: 1px; border-color: var(--ink); }
  .btn {
    display: block; width: 100%; padding: 13px;
    background: var(--orange); color: var(--ink);
    border: 2px solid var(--ink); border-radius: 4px;
    font-family: var(--font-sans); font-weight: 700; font-size: 15px;
    cursor: pointer; box-shadow: 3px 3px 0 var(--ink);
    margin-top: 6px;
    transition: transform 120ms, box-shadow 120ms;
  }
  .btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); background: var(--orange-deep); }
  .btn:active { transform: translate(2px,2px); box-shadow: none; }
</style>
</head>
<body>
  <div class="lc">
    <span class="eyebrow">Lead capture</span>
    <h3>Want us to look into this?</h3>
    <p>Drop your details and we&rsquo;ll scope it out — no obligation, no runaround.</p>
    <div class="row">
      <input class="input" placeholder="Name">
      <input class="input" placeholder="Business name">
    </div>
    <div class="row">
      <input class="input" placeholder="Phone">
      <input class="input" placeholder="Email">
    </div>
    <button class="btn">Get a callback</button>
  </div>
</body>
</html>
